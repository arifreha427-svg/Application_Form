<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f8ff;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    form {
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      width: 570px;
      margin: auto;
    }
    fieldset {
      border: 2px solid #005c99;
      margin-bottom: 20px;
      padding: 15px;
    }
    legend {
      font-weight: bold;
      color: #005c99;
    }
    label {
      display: inline-block;
      width: 150px;
      margin-bottom: 10px;
    }
    input, select {
      padding: 5px;
      margin-bottom: 10px;
    }
    .checkbox-group {
      display: inline-block;
      margin-right: 10px;
      width: 100px;
    }
    table {
      width:40px;
      border-collapse: collapse;
      margin-top: 10px;
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 8px;
      text-align: center;
    }
    td input{
      width: 50px;
    }
    .submit-btn {
      display: block;
      margin: auto;
      padding: 10px 20px;
      background: #005c99;
      color: white;
      border: none;
      cursor: pointer;
    }
    .submit-btn:hover {
      background: #003d66;
    }
  </style>
</head>
<body>

<h1>Application Form</h1>

<form>
  <fieldset>
    <legend>A. General Questions</legend>
    <label>Name:</label>
    <input type="text" name="name"><br>
    <label>Birth Date:</label>
    <input type="date" name="dob"><br>
    <label>Gender:</label>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female <br>
    <label>Email:</label>
    <input type="email" name="email"><br>
    <label>Phone:</label>
    <input type="tel" name="phone"><br>
  </fieldset>
  <fieldset>
    <legend>B. Type of Health Coverage</legend>
    <div class="checkbox-group">
      <input type="checkbox" name="employee"> Employee</div>
    <div class="checkbox-group">
      <input type="checkbox" name="spouse"> Spouse
    </div>
    <div class="checkbox-group">
      <input type="checkbox" name="children"> Children
    </div>

    <table>
      <tr>
        <th>Name</th>
        <th>ID No</th>
        <th>Relationship</th>
        <th>Birth Date</th>
        <th>Age</th>
        <th>Sex</th>
      </tr>
      <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="date"></td>
        <td><input type="number"></td>
        <td>
          <select>
            <option>Male</option>
            <option>Female</option>
          </select>
        </td>
      </tr>
    </table>
  </fieldset>
  <fieldset>
    <legend>C. The Policy</legend>
    <label>Annual Premium:</label>
    <input type="number" name="premium"><br>
    <label>Payment Mode:</label>
    <select name="payment">
      <option>Annual</option>
      <option>Semi-Annual</option>
      <option>Monthly</option>
    </select><br>
    <label>Signature:</label>
    <input type="text" name="signature"><br>
    <label>Date:</label>
    <input type="date" name="date"><br>
  </fieldset>

  <button type="submit" class="submit-btn">Submit</button>
</form>

</body>
</html>
